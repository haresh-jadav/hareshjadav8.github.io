<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haresh Jadav | Mars & Physics</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    background: black;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    text-align: center;
    z-index: 10;
}

nav button {
    background: none;
    border: none;
    color: white;
    margin: 0 10px;
    font-size: 16px;
    cursor: pointer;
}

nav button:hover {
    color: orange;
}

/* SECTIONS */
section {
    display: none;
    padding: 80px 40px;
    margin-top: 60px;
    background: rgba(0,0,0,0.5);
    border-radius: 12px;
}

.active {
    display: block;
}

/* TITLES */
h1, h2, h3 {
    color: orange;
}

/* CANVAS BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}
</style>
</head>

<body>

<!-- BACKGROUND ANIMATION -->
<canvas id="space"></canvas>

<!-- NAV -->
<nav>
    <button onclick="show('home')">Home</button>
    <button onclick="show('about')">About</button>
    <button onclick="show('research')">Research</button>
    <button onclick="show('projects')">Projects</button>
    <button onclick="show('blog')">Mars Blog</button>
    <button onclick="show('contact')">Contact</button>
</nav>

<!-- SECTIONS -->
<section id="home" class="active">
    <h1>Haresh Jadav</h1>
    <h3>Mars | Physics | Astrophysics Researcher</h3>
</section>

<section id="about">
    <h2>About</h2>
    <p>Mars and planetary science researcher.</p>
</section>

<section id="research">
    <h2>Research</h2>
    <p>Solar physics, FESEM, Mars atmosphere studies.</p>
</section>

<section id="projects">
    <h2>Projects</h2>
    <p>Mars atmospheric and material research.</p>
</section>

<section id="blog">
    <h2>Mars Blog</h2>
    <p>NASA + ISRO updates and Mars exploration notes.</p>
</section>

<section id="contact">
    <h2>Contact</h2>
    <p>yourmail@gmail.com</p>
</section>

<script>
function show(id) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* =========================
   MARS + SATELLITE ANIMATION
========================= */

const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let centerX = canvas.width / 2;
let centerY = canvas.height / 2;

let angle = 0;

// Mars properties
const marsRadius = 70;

// orbit radius
const orbitRadius = 180;

function drawMars() {
    const gradient = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, marsRadius);
    gradient.addColorStop(0, "#ff7b3a");
    gradient.addColorStop(1, "#8b2e1a");

    ctx.beginPath();
    ctx.fillStyle = gradient;
    ctx.arc(centerX, centerY, marsRadius, 0, Math.PI * 2);
    ctx.fill();
}

// satellite
function drawSatellite(x, y) {
    ctx.fillStyle = "white";
    ctx.fillRect(x - 6, y - 2, 12, 4); // body
    ctx.fillRect(x - 10, y - 6, 6, 2); // solar panel
    ctx.fillRect(x + 4, y - 6, 6, 2);  // solar panel
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // stars
    for (let i = 0; i < 100; i++) {
        ctx.fillStyle = "white";
        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1, 1);
    }

    drawMars();

    // satellite orbit
    let x = centerX + orbitRadius * Math.cos(angle);
    let y = centerY + orbitRadius * Math.sin(angle);

    drawSatellite(x, y);

    angle += 0.01;

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    centerX = canvas.width / 2;
    centerY = canvas.height / 2;
});
</script>

</body>
</html>
